<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Repertoire Explorer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/*! chessboard.js v1.0.0 | (c) 2019 Chris Oakman | MIT License chessboardjs.com/license */
.clearfix-7da63{clear:both}.board-b72b1{border:2px solid #404040;box-sizing:content-box}.square-55d63{float:left;position:relative;-webkit-touch-callout:none;-webkit-user-select:none;-khtml-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none}.white-1e1d7{background-color:#f0d9b5;color:#b58863}.black-3c85d{background-color:#b58863;color:#f0d9b5}.highlight1-32417,.highlight2-9c5d2{box-shadow:inset 0 0 3px 3px #ff0}.notation-322f9{cursor:default;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:14px;position:absolute}.alpha-d2270{bottom:1px;right:3px}.numeric-fc462{top:2px;left:2px}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
       background: #1e1f22; color: #ddd; margin: 0; padding: 16px; }
.wrap { display: flex; gap: 24px; max-width: 1200px; margin: 0 auto; }
#board { width: 480px; }
.panel { flex: 1; min-width: 0; }
h1 { margin: 0 0 8px; font-size: 20px; font-weight: 500; }
.meta { color: #888; font-size: 13px; margin-bottom: 12px; }
.hero-toggle { display: flex; gap: 4px; margin-bottom: 12px; align-items: center; }
.hero-toggle button { background: #2b2d31; color: #ccc; border: 1px solid #3a3c41;
       padding: 6px 14px; cursor: pointer; border-radius: 4px; font-size: 14px; }
.hero-toggle button.active { background: #4f86d4; color: #fff; border-color: #4f86d4; }
.row { padding: 6px 8px; border-bottom: 1px solid #2a2c30; cursor: pointer;
       display: flex; align-items: center; font-family: "SF Mono", Menlo, monospace; }
.row:hover { background: #2b2d31; }
.row.recommended { background: #2f4a2c; }
.row.recommended:hover { background: #3f5a3c; }
.san { width: 60px; font-weight: 600; }
.badge { color: #aaa; font-size: 11px; padding: 2px 5px; background: #2a2c30;
         border-radius: 3px; margin-left: 6px; }
.stats { color: #888; font-size: 12px; margin-left: auto; padding-left: 12px; }
.bar { display: inline-flex; height: 4px; width: 80px; border-radius: 2px; overflow: hidden;
       margin-left: 8px; vertical-align: middle; background: #2a2c30; }
.bar > span { display: block; }
.bar .w { background: #d4d4d4; }
.bar .d { background: #6b6e73; }
.bar .b { background: #1a1a1a; }
.v { color: #6ab26a; font-weight: 600; font-size: 13px; margin-left: 10px; }
.v.bad { color: #d46a6a; }
.nav { margin-top: 12px; display: flex; gap: 8px; }
.nav button { background: #2b2d31; color: #ccc; border: 1px solid #3a3c41;
              padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; }
.out-of-book { color: #d4a000; font-style: italic; padding: 12px 0; }
.line { color: #888; font-size: 12px; margin-top: 8px; font-family: "SF Mono", Menlo, monospace; word-break: break-word; }
.header-info { font-size: 13px; color: #aaa; margin-bottom: 8px; }
.header-info strong { color: #6ab26a; }
.header-info strong.bad { color: #d46a6a; }
</style>
</head>
<body>
<div class="wrap">
  <div>
    <div id="board"></div>
    <div class="nav">
      <button onclick="navBack()">⟵ Back</button>
      <button onclick="navStart()">⏮ Start</button>
      <button onclick="flipBoard()">⟲ Flip</button>
    </div>
    <div class="line" id="line-display"></div>
  </div>
  <div class="panel">
    <h1>Repertoire Explorer</h1>
    <div class="meta" id="meta"></div>
    <div class="hero-toggle">
      <span style="font-size:13px;color:#888;margin-right:8px;">Playing as:</span>
      <button id="hero-w" class="active" onclick="setHero(true)">White</button>
      <button id="hero-b" onclick="setHero(false)">Black</button>
    </div>
    <div class="header-info" id="header-info"></div>
    <div id="moves"></div>
  </div>
</div>

const shortFen = f => f.split(" ").slice(0, 3).join(" ");
let heroWhite = true;
let game = new Chess();
let history = [];
let boardOrientation = 'white';

const board = Chessboard('board', {
  draggable: true, position: 'start',
  pieceTheme: (piece) => PIECES[piece],
  onDrop: (src, dst) => {
    const mv = game.move({ from: src, to: dst, promotion: 'q' });
    if (!mv) return 'snapback';
    history.push(mv.san);
    render();
  },
  onSnapEnd: () => board.position(game.fen()),
});

function render() {
  board.position(game.fen());
  const sf = shortFen(game.fen());
  const data = REP.positions[sf];
  document.getElementById('line-display').textContent = history.join(' ');
  document.getElementById('meta').textContent =
    `${Object.keys(REP.positions).length} positions in repertoire`;
  const moves = document.getElementById('moves');
  const info = document.getElementById('header-info');
  if (!data) {
    moves.innerHTML = '<div class="out-of-book">Out of book — no data for this position.</div>';
    info.innerHTML = '';
    return;
  }
  const turnWhite = game.turn() === 'w';
  const isHero = (turnWhite === heroWhite);
  const v = heroWhite ? data.vw : data.vb;
  const choiceIdx = heroWhite ? data.cw : data.cb;
  const vStr = (v == null) ? '—' : v.toFixed(3);
  const vClass = (v != null && v < 0.5) ? 'bad' : '';
  info.innerHTML = `Position value (${heroWhite ? 'White' : 'Black'}'s perspective): <strong class="${vClass}">${vStr}</strong><br>` +
    (isHero ? `<em>${heroWhite ? 'White' : 'Black'} to move — recommended in green.</em>` :
              `<em>${turnWhite ? 'White' : 'Black'} to move — these are popular replies you may face.</em>`);
  const totalAll = data.m.reduce((s, x) => s + x[2] + x[3] + x[4], 0);
  const items = data.m.map((mv, i) => {
    const [san, uci, w, d, b, vwAfter, vbAfter] = mv;
    const total = w + d + b;
    // Backed-up win% of the resulting position from hero's perspective.
    // These values are computed in plan.py / export_web.py via the
    // hero-max + opponent-popularity recursion and DO NOT sum to 1 between sides.
    const vAfter = heroWhite ? vwAfter : vbAfter;
    const wPct = w / total, dPct = d / total, bPct = b / total;
    return { san, uci, w, d, b, total, rec: i === choiceIdx,
             popPct: total / totalAll, wPct, dPct, bPct, vAfter };
  });
  moves.innerHTML = items.map(it => `
    <div class="row ${it.rec ? 'recommended' : ''}" onclick="playMove('${it.san}')">
      <span class="san">${it.san}</span>
      <span class="badge">${(it.popPct * 100).toFixed(0)}%</span>
      <span class="bar">
        <span class="w" style="width:${it.wPct * 80}px"></span>
        <span class="d" style="width:${it.dPct * 80}px"></span>
        <span class="b" style="width:${it.bPct * 80}px"></span>
      </span>
      <span class="stats">${it.total.toLocaleString()} games</span>
      ${it.vAfter != null ? `<span class="v ${it.vAfter < 0.5 ? 'bad' : ''}">${it.vAfter.toFixed(3)}</span>` : ''}
    </div>
  `).join('');
}
function playMove(san) {
  const mv = game.move(san);
  if (mv) { history.push(mv.san); render(); }
}
function navBack() {
  const undone = game.undo();
  if (undone) { history.pop(); render(); }
}
function navStart() { game.reset(); history = []; render(); }
function flipBoard() {
  boardOrientation = (boardOrientation === 'white') ? 'black' : 'white';
  board.orientation(boardOrientation);
}
function setHero(w) {
  heroWhite = w;
  document.getElementById('hero-w').classList.toggle('active', w);
  document.getElementById('hero-b').classList.toggle('active', !w);
  if (!w && boardOrientation === 'white') flipBoard();
  if (w && boardOrientation === 'black') flipBoard();
  render();
}
render();
</script>
